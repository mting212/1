# MeetFlow site config
# Stage 1: HTTP-only (run certbot to get SSL, then switch to HTTPS block)

server {
    listen 80;
    server_name meetflow.dev staging.meetflow.dev;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (after cert obtained)
    # return 301 https://$host$request_uri;

    # Or serve directly for initial setup / staging
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

